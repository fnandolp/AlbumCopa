name: Deploy para o GitHub Pages

on:
  push:
    branches: [ main ] # Vai rodar sempre que você enviar algo para a branch main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Instalar dependências
        run: npm install
        
      - name: Compilar o projeto (Build)
        run: npm run build
        
      - name: Fazer upload dos arquivos
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # A pasta onde o Vite salva o projeto compilado

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
